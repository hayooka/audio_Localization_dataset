<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SoundSense</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; margin: 0;
         background: #f0f2f8; color: #1a1a2e; text-align: center; padding: 24px; }
  h1   { font-size: 28px; margin-bottom: 8px; }
  p    { font-size: 15px; color: #666; max-width: 320px; line-height: 1.5; }
  .server-url { font-family: monospace; background: #e8eaf6; border-radius: 8px;
                padding: 10px 16px; font-size: 14px; margin: 16px 0; }
</style>
</head>
<body>
<h1>SoundSense</h1>
<p>This app requires a connection to the SoundSense Python server on your local Wi-Fi network.</p>
<p>Edit <strong>capacitor.config.json</strong> → <code>server.url</code> to point to your server:</p>
<div class="server-url" id="srv"></div>
<p>Then rebuild the app with <code>npm run android</code> or <code>npm run ios</code>.</p>
<script>
  // Show the currently-configured server URL from the Capacitor bridge if available,
  // otherwise a placeholder.
  var cap = window.Capacitor;
  var url = (cap && cap.getPlatform && cap.getPlatform() !== 'web')
    ? 'Loaded from capacitor.config.json'
    : 'http://&lt;server-ip&gt;:8000';
  document.getElementById('srv').innerHTML = url;
</script>
</body>
</html>
